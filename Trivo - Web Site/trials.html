<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Trivo World - Registration</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: Poppins, sans-serif;
    }

    body {
      background: #F8FAFC;
    }

    /* LEFT PANEL */

    .left-panel {
      min-height: 100vh;

      background:
        linear-gradient(rgba(10, 42, 102, .60), rgba(10, 42, 102, .60)),
        url(images/bg.jpg);

      background-size: cover;
      background-position: center;
    }

    .logo {
      width: 280px;
    }

    .tagline {
      color: white;
      letter-spacing: 2px;
    }

    /* RIGHT PANEL */

    .right-panel {
      min-height: 100vh;
    }

    .register-card {

      width: 650px;

      background: white;

      border-radius: 25px;

      padding: 40px;

      box-shadow:
        0 10px 30px rgba(0, 0, 0, .15);

    }


    .heading {
      color: #0A2A66;
      font-weight: 700;
    }


    .form-control {

      height: 55px;

      border-radius: 15px;

    }


    textarea.form-control {

      height: 100px;

    }


    .form-control:focus {

      border-color: #0F9D9A;

      box-shadow: none;

    }


    .btn-register {

      height: 55px;

      background: #0F9D9A;

      color: white;

      border-radius: 15px;

      font-size: 20px;

    }


    .btn-register:hover {

      background: #FF8C42;

      color: white;

    }


    .btn-login {

      height: 55px;

      border-radius: 15px;

    }

    a {
      text-decoration: none;
    }
  </style>

</head>

<body>

  <div class="container-fluid">

    <div class="row">

      <!-- LEFT PANEL -->

      <div class="col-lg-5 left-panel d-flex justify-content-center align-items-center">

        <div class="text-center">

          <img src="images/logo.png" class="logo">

          <h3 class="text-white mt-4">
            Explore • Experience • Enjoy
          </h3>

          <p class="tagline mt-3">
            Discover amazing destinations around the world
          </p>

        </div>

      </div>


      <!-- RIGHT PANEL -->

      <div class="col-lg-7 right-panel d-flex justify-content-center align-items-center">

        <div class="register-card">

          <h2 class="heading mb-2">
            Create Account
          </h2>

          <p class="text-muted mb-4">
            Join Trivo World and start your next adventure.
          </p>


          <form>

            <div class="row">

              <div class="col-md-6 mb-3">

                <label>Full Name</label>

                <input type="text" class="form-control" placeholder="Enter full name">

              </div>

              <div class="col-md-6 mb-3">

                <label>Phone Number</label>

                <input type="text" class="form-control" placeholder="Enter phone number">

              </div>

            </div>


            <div class="mb-3">

              <label>Email Address</label>

              <input type="email" class="form-control" placeholder="Enter email address">

            </div>


            <div class="mb-3">

              <label>Date of Birth</label>

              <input type="date" class="form-control">

            </div>


            <div class="mb-3">

              <label>Passport Number</label>

              <input type="text" class="form-control" placeholder="Passport number">

            </div>


            <div class="mb-3">

              <label>Address</label>

              <textarea class="form-control" placeholder="Enter address"></textarea>

            </div>


            <div class="row">

              <div class="col-md-6 mb-3">

                <label>Password</label>

                <input type="password" class="form-control" placeholder="Password">

              </div>

              <div class="col-md-6 mb-4">

                <label>Confirm Password</label>

                <input type="password" class="form-control" placeholder="Confirm password">

              </div>

            </div>


            <div class="d-grid mb-3">

              <button class="btn btn-register">

                Register

              </button>

            </div>

            <hr>

            <div class="text-center mb-3">

              Already have an account?

            </div>


            <div class="d-grid">

              <a href="login.html" class="btn btn-outline-secondary btn-login">

                Back to Login

              </a>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

</body>

</html>
