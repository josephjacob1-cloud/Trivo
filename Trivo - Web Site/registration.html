<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trivo World Registration</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

body{
    background-image:url("assets/images/tvm.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    min-height:100vh;
}

.header{
    background:#ffffff;
    height:110px;
}

.logo{
    height:90px;
    margin-top:10px;
    margin-left:20px;
}

.register-panel{
    background:#FFFFFF80;
    width:70%;
    margin:auto;
    margin-top:30px;
    padding:40px 80px;
}

.form-control{
    border-radius:0;
    height:40px;
}

textarea{
    resize:none;
}

.btn-register,
.btn-login{
    background:#199BE8;
    color:white;
    font-size:20px;
    border-radius:8px;
}

.btn-register:hover,
.btn-login:hover{
    background:#0F9D9A;
    color:white;
}

.social i{
    font-size:40px;
    margin:10px;
}

.youtube{
    color:red;
}

.instagram{
    color:#ff00ff;
}

.facebook{
    color:#1877f2;
}

</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <img src="assets/images/trivo logo.png" class="logo">
</div>


<div class="register-panel">

<div class="row">

<div class="col-md-4">
<h1 class="fw-bold">CREATE ACCOUNT</h1>
</div>

<div class="col-md-8 text-center">
<h2 class="fw-bold mt-3">
JOIN US AND EXPLORE THE WORLD
</h2>
</div>

</div>

<div class="row justify-content-center">

<div class="col-md-9">

<form>

<!-- Name -->
<div class="mb-2">
<label class="fw-bold">Name:</label>
<input type="text"
class="form-control"
placeholder="Enter Your Full Name">
</div>

<!-- Phone -->
<div class="mb-2">
<label class="fw-bold">Phone:</label>
<input type="text"
class="form-control"
placeholder="Enter Your Phone Number">
</div>

<!-- Email -->
<div class="mb-2">
<label class="fw-bold">Email:</label>
<input type="email"
class="form-control"
placeholder="Enter Your Email ID">
</div>

<!-- Username -->
<div class="mb-2">
<label class="fw-bold">Username:</label>
<input type="text"
class="form-control"
placeholder="Enter Your User Name">
</div>

<!-- DOB -->
<div class="mb-2">
<label class="fw-bold">Date of Birth:</label>
<input type="date"
class="form-control">
</div>

<!-- Passport -->
<div class="mb-2">
<label class="fw-bold">Passport Number:</label>
<input type="text"
class="form-control"
placeholder="9 digit Passport Number">
</div>

<!-- Address -->
<div class="mb-3">
<label class="fw-bold">Address:</label>
<textarea class="form-control"
rows="4"
placeholder="Enter Your Permanent Address"></textarea>
</div>

<!-- Password -->
<div class="mb-2">
<label class="fw-bold">Password:</label>
<input type="password"
class="form-control"
placeholder="Enter Password">
</div>

<!-- Confirm Password -->
<div class="mb-4">
<label class="fw-bold">Confirm Password:</label>
<input type="password"
class="form-control"
placeholder="Confirm Password">
</div>

<!-- Register -->
<div class="d-grid mb-3">
<button class="btn btn-register">
Register
</button>
</div>

<!-- Back -->
<div class="d-grid mb-3">
<a href="login.html"
class="btn btn-login">
Back to Login
</a>
</div>

<!-- Social -->
<div class="text-center social">

<a href="#">
<i class="bi bi-youtube youtube"></i>
</a>

<a href="#">
<i class="bi bi-instagram instagram"></i>
</a>

<a href="#">
<i class="bi bi-facebook facebook"></i>
</a>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
