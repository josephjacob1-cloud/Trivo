<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Trivo World Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-image: url('assets/images/tvm.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, .20);
            height: 110px;
        }

        .logo {
            height: 90px;
            margin-top: 10px;
            margin-left: 20px;
        }

        .login-panel {
            background: #FFFFFF80;
            width: 75%;
            min-height: 620px;
            margin: auto;
            margin-top: 80px;
            padding-top: 100px;
        }

        .title {
            font-size: 50px;
            color: #0A2A66;
            font-weight: 300;
        }

        .form-control {
            height: 55px;
            border-radius: 0px;
        }

        .btn-login {
            background: #199be8;
            color: white;
            height: 55px;
            font-size: 30px;
            border-radius: 10px;
        }

        .btn-login:hover {
            background: #0F9D9A;
            color: white;
        }

        .btn-signup {
            background: #199be8;
            color: white;
            height: 55px;
            font-size: 22px;
            border-radius: 10px;
        }

        .btn-signup:hover {
            background: #FF8C42;
            color: white;
        }

        .forgot {
            float: right;
            color: black;
            font-weight: bold;
            text-decoration: none;
        }

        .social i {
            font-size: 45px;
            margin: 10px;
        }

        .youtube {
            color: red;
        }

        .instagram {
            color: #ff00ff;
        }

        .facebook {
            color: #1877F2;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">

        <img src="assets/images/trivo logo.png" class="logo">

    </div>

    <!-- Login Panel -->
    <div class="login-panel">

        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-7">

                    <h2 class="text-center mb-5">
                        Login to explore the world
                    </h2>

                    <form>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="email" class="form-control" placeholder="Enter Your Email Address">
                        </div>

                        <div class="mb-2">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" placeholder="Password">
                        </div>

                        <div class="mb-4">
                            <a href="#" class="forgot">
                                Forgot Password
                            </a>
                        </div>

                        <div class="d-grid mb-5">
                            <button class="btn btn-login">
                                Login
                            </button>
                        </div>

                        <div class="d-grid mb-4">
                            <button class="btn btn-signup">
                                New User Sign Up Here !
                            </button>
                        </div>

                        <div class="text-center social">

                            <a href="#">
                                <i class="bi bi-youtube youtube"></i>
                            </a>

                            <a href="#">
                                <i class="bi bi-instagram instagram"></i>
                            </a>

                            <a href="#">
                                <i class="bi bi-facebook facebook"></i>
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
