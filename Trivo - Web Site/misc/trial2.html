<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trivo World - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: Poppins, sans-serif;
        }

        body {
            background: #F8FAFC;
            overflow: hidden;
        }

        /* LEFT SIDE */

        .left-panel {
            height: 100vh;
            background:
                linear-gradient(rgba(10, 42, 102, .55), rgba(10, 42, 102, .55)),
                url(images/bg.jpg);

            background-size: cover;
            background-position: center;
        }

        .logo {
            width: 280px;
        }

        .tagline {
            color: white;
            letter-spacing: 2px;
        }


        /* RIGHT SIDE */

        .right-panel {
            height: 100vh;
        }

        .login-card {

            width: 500px;

            background: white;

            border-radius: 25px;

            padding: 50px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .15);

        }


        .heading {
            color: #0A2A66;
            font-weight: 700;
        }

        .form-control {

            height: 55px;

            border-radius: 15px;

        }


        .form-control:focus {

            border-color: #0F9D9A;

            box-shadow: none;

        }


        .btn-login {

            height: 55px;

            background: #0F9D9A;

            color: white;

            border-radius: 15px;

            font-size: 20px;

        }


        .btn-login:hover {

            background: #FF8C42;

            color: white;

        }


        .btn-register {

            height: 55px;

            border-radius: 15px;

        }


        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- LEFT PANEL -->

            <div class="col-lg-5 left-panel d-flex justify-content-center align-items-center">

                <div class="text-center">

                    <img src="images/logo.png" class="logo">

                    <h3 class="text-white mt-4">
                        Explore • Experience • Enjoy
                    </h3>

                    <p class="tagline mt-3">
                        Discover amazing destinations around the world
                    </p>

                </div>

            </div>


            <!-- RIGHT PANEL -->

            <div class="col-lg-7 right-panel d-flex justify-content-center align-items-center">

                <div class="login-card">

                    <h2 class="heading mb-4">
                        Welcome Back
                    </h2>

                    <p class="text-muted mb-4">
                        Login to continue your journey with Trivo World.
                    </p>


                    <form>

                        <div class="mb-3">

                            <label>Email Address</label>

                            <input type="email" class="form-control" placeholder="Enter your email">

                        </div>


                        <div class="mb-3">

                            <label>Password</label>

                            <input type="password" class="form-control" placeholder="Enter your password">

                        </div>


                        <div class="text-end mb-4">

                            <a href="forgotpassword.html">
                                Forgot Password?
                            </a>

                        </div>


                        <div class="d-grid mb-3">

                            <button class="btn btn-login">
                                Login
                            </button>

                        </div>


                        <hr>

                        <div class="text-center mb-3">

                            Don't have an account?

                        </div>


                        <div class="d-grid">

                            <a href="registration.html" class="btn btn-outline-secondary btn-register">

                                Create Account

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
