<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trivo World - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            font-family: Poppins, sans-serif;
        }

        body {
            background: #F8FAFC;
            overflow: hidden;
        }


        /* LEFT PANEL */

        .left-panel {

            height: 100vh;

            background:
                linear-gradient(rgba(10, 42, 102, .60),
                    rgba(10, 42, 102, .60)),

                url(images/bg.jpg);

            background-size: cover;
            background-position: center;
        }

        .logo {
            width: 180px;
        }

        .tagline {

            color: white;

            letter-spacing: 2px;

            font-size: 15px;
        }



        /* RIGHT PANEL */

        .right-panel {
            height: 100vh;
        }


        .login-card {

            width: 400px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, .15);

        }


        .heading {

            color: #0A2A66;

            font-weight: 700;

            font-size: 30px;
        }


        .form-control {

            height: 44px;

            border-radius: 12px;

        }


        .form-control:focus {

            border-color: #0F9D9A;

            box-shadow: none;

        }


        .btn-login {

            background: #0F9D9A;

            color: white;

            height: 44px;

            border-radius: 12px;

        }


        .btn-login:hover {

            background: #FF8C42;

            color: white;

        }


        .btn-register {

            height: 44px;

            border-radius: 12px;

        }


        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- LEFT -->

            <div class="col-lg-6 left-panel d-flex justify-content-center align-items-center">

                <div class="text-center">

                    <img src="images/logo.png" class="logo">

                    <h2 class="text-white mt-4">
                        TRIVO WORLD
                    </h2>

                    <p class="tagline">
                        Explore • Discover • Experience
                    </p>

                </div>

            </div>



            <!-- RIGHT -->

            <div class="col-lg-6 right-panel d-flex justify-content-center align-items-center">

                <div class="login-card">

                    <h2 class="heading mb-2">
                        Welcome Back 👋
                    </h2>

                    <p class="text-muted mb-4">
                        Login to continue your journey.
                    </p>


                    <form>


                        <div class="mb-3">

                            <label>Email Address</label>

                            <input type="email" class="form-control" placeholder="Enter email">

                        </div>



                        <div class="mb-2">

                            <label>Password</label>

                            <input type="password" class="form-control" placeholder="Enter password">

                        </div>


                        <div class="text-end mb-4">

                            <a href="forgotpassword.html">

                                Forgot Password?

                            </a>

                        </div>


                        <div class="d-grid mb-3">

                            <button class="btn btn-login">

                                LOGIN

                            </button>

                        </div>


                        <hr>


                        <div class="text-center">

                            <p class="text-muted">

                                Don't have an account?

                            </p>

                            <a href="registration.html" class="btn btn-outline-secondary btn-register w-100">

                                Create Account

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
