<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Trivo World</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Style -->

    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            background: #F5F7FA;
            overflow: hidden;
        }

        .left-panel {

            height: 100vh;

            background:
                linear-gradient(rgba(10, 42, 102, .65),
                    rgba(10, 42, 102, .65)),
                url("../images/forgot-bg.jpg");

            background-size: cover;
            background-position: center;
        }

        .logo {
            width: 180px;
        }

        .forgot-card {

            width: 430px;

            background: white;

            padding: 45px;

            border-radius: 20px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);

        }

        .form-control {
            height: 48px;
        }

        .btn-reset {

            background: #0F9D9A;

            color: white;

            height: 48px;

            border-radius: 12px;

            font-weight: 600;

        }

        .btn-reset:hover {

            background: #FF8C42;

            color: white;

        }

        a {
            text-decoration: none;
        }
    </style>

</head>

<body>

    <div class="container-fluid">

        <div class="row">

            <!-- LEFT -->

            <div class="col-lg-6 left-panel d-none d-lg-flex
justify-content-center
align-items-center">

                <div class="text-center">

                    <img src="../images/logo.png" class="logo mb-4">

                    <h1 class="text-white fw-bold">

                        TRIVO WORLD

                    </h1>

                    <p class="text-white">

                        Explore • Discover • Experience

                    </p>

                </div>

            </div>



            <!-- RIGHT -->

            <div class="col-lg-6 d-flex
justify-content-center
align-items-center vh-100">

                <div class="forgot-card">

                    <h2 class="fw-bold mb-3" style="color:#0A2A66;">

                        Forgot Password?

                    </h2>

                    <p class="text-muted mb-4">

                        Enter your email address to receive password reset instructions.

                    </p>


                    <form>

                        <div class="mb-4">

                            <label class="mb-2">

                                Email Address

                            </label>

                            <div class="input-group">

                                <span class="input-group-text">

                                    <i class="bi bi-envelope"></i>

                                </span>

                                <input type="email" class="form-control" placeholder="Enter email address">

                            </div>

                        </div>


                        <div class="d-grid mb-4">

                            <button class="btn btn-reset">

                                SEND RESET LINK

                            </button>

                        </div>


                        <hr>


                        <div class="text-center">

                            <a href="login.html" style="color:#0F9D9A;">

                                <i class="bi bi-arrow-left"></i>

                                Back to Login

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
