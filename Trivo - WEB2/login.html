<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login in to Trivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container-fluid">

        <div class="row vh-100">

            <!-- Left -->

            <div class="col-lg-5 d-none d-lg-block p-0">

                <div class="h-100 position-relative">

                    <img src="../images/login-bg.jpg" class="w-100 h-100 object-fit-cover">

                    <div class="position-absolute top-50 start-50 translate-middle text-center">

                        <img src="../images/logo.png" width="180">

                        <h3 class="text-white mt-3">
                            TRIVO WORLD
                        </h3>

                        <p class="text-white">
                            Your Journey, Reimagined
                        </p>

                    </div>

                </div>

            </div>


            <!-- Right -->

            <div class="col-lg-7 d-flex align-items-center justify-content-center">

                <div class="card card-custom p-5" style="width:400px;">

                    <h2 class="fw-bold text-primary-custom">
                        Welcome Back
                    </h2>

                    <p class="text-muted mb-4">
                        Login to continue your journey
                    </p>


                    <div class="mb-3">

                        <label>Email Address</label>

                        <input type="email" class="form-control" placeholder="Enter email">

                    </div>


                    <div class="mb-2">

                        <label>Password</label>

                        <input type="password" class="form-control" placeholder="Enter password">

                    </div>


                    <div class="text-end mb-4">

                        <a href="forgot-password.html" class="text-secondary-custom">

                            Forgot Password?

                        </a>

                    </div>


                    <div class="d-grid mb-3">

                        <button class="btn btn-teal">

                            LOGIN

                        </button>

                    </div>


                    <hr>

                    <div class="text-center">

                        Don't have an account?

                        <a href="register.html" class="text-secondary-custom">

                            Create Account

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>
</body>

</html>
