<div class="container-fluid">

    <div class="row vh-100">

        <!-- Left Panel -->

        <div class="col-lg-5 d-none d-lg-block p-0">

            <div class="h-100 position-relative">

                <img src="../images/register-bg.jpg" class="w-100 h-100 object-fit-cover">

                <div class="position-absolute top-50 start-50 translate-middle text-center">

                    <img src="../images/logo.png" width="180">

                    <h3 class="text-white mt-3">
                        TRIVO WORLD
                    </h3>

                    <p class="text-white">
                        Explore • Discover • Experience
                    </p>

                </div>

            </div>

        </div>


        <!-- Right Panel -->

        <div class="col-lg-7 d-flex justify-content-center align-items-center">

            <div class="card card-custom p-5" style="width:450px;">

                <h2 class="fw-bold text-primary-custom">
                    Create Account
                </h2>

                <p class="text-muted mb-4">
                    Join Trivo World and start your journey.
                </p>


                <div class="mb-3">

                    <label>Full Name</label>

                    <input type="text" class="form-control" placeholder="Enter your full name">

                </div>


                <div class="mb-3">

                    <label>Email Address</label>

                    <input type="email" class="form-control" placeholder="Enter email">

                </div>


                <div class="mb-3">

                    <label>Phone Number</label>

                    <input type="text" class="form-control" placeholder="Enter phone number">

                </div>


                <div class="mb-3">

                    <label>Password</label>

                    <input type="password" class="form-control" placeholder="Enter password">

                </div>


                <div class="mb-3">

                    <label>Confirm Password</label>

                    <input type="password" class="form-control" placeholder="Confirm password">

                </div>


                <div class="form-check mb-4">

                    <input class="form-check-input" type="checkbox">

                    <label class="form-check-label">

                        I agree to the
                        <a href="#" class="text-secondary-custom">
                            Terms & Conditions
                        </a>

                    </label>

                </div>


                <div class="d-grid mb-3">

                    <button class="btn btn-teal">

                        REGISTER

                    </button>

                </div>


                <hr>

                <div class="text-center">

                    Already have an account?

                    <a href="login.html" class="text-secondary-custom">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
