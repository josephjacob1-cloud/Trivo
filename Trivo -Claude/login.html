<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Trivo World</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar navbar-tw navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="index.html">
        <svg class="brand-logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="22" fill="#1B2A6B"/>
          <line x1="10" y1="22" x2="34" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="22" y1="10" x2="22" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M14 16 L22 10 L30 16" stroke="#E8A020" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <div class="brand-name">Trivo World</div>
          <div class="brand-tagline">Your journey, reimagined</div>
        </div>
      </a>
    </div>
  </nav>

  <!-- ── Auth Wrapper ── -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Login to explore the world</h2>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="email" class="form-control" placeholder="Enter Your Email Address" />
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Password" />
      </div>

      <div class="mb-3 text-end">
        <a href="#" class="forgot-link">Forgot Password</a>
      </div>

      <div class="mb-3">
        <a href="home.html" class="btn-tw-primary text-center text-decoration-none d-block py-2 rounded">Login</a>
      </div>

      <div class="mb-3">
        <a href="register.html" class="btn-tw-outline text-center text-decoration-none d-block py-2 rounded">
          New User <strong>Sign Up</strong> here!
        </a>
      </div>

      <div class="social-icons text-center mt-3 d-flex justify-content-center gap-2">
        <a href="#" class="social-yt"><i class="bi bi-youtube"></i></a>
        <a href="#" class="social-ig"><i class="bi bi-instagram"></i></a>
        <a href="#" class="social-fb"><i class="bi bi-facebook"></i></a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
