<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – Trivo World</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Navbar ── -->
  <nav class="navbar navbar-tw navbar-expand-lg sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="index.html">
        <svg class="brand-logo" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="22" fill="#1B2A6B"/>
          <line x1="10" y1="22" x2="34" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="22" y1="10" x2="22" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M14 16 L22 10 L30 16" stroke="#E8A020" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <div class="brand-name">Trivo World</div>
          <div class="brand-tagline">Your journey, reimagined</div>
        </div>
      </a>
    </div>
  </nav>

  <!-- ── Auth Wrapper ── -->
  <div class="auth-wrapper py-5">
    <div class="auth-card" style="max-width:560px;">
      <h2>CREATE ACCOUNT</h2>
      <p class="text-center fw-bold small text-uppercase mb-3" style="color:var(--tw-navy);letter-spacing:.1em;">
        Join us and explore the world
      </p>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Name:</label>
          <input type="text" class="form-control" placeholder="Enter Your Full Name" />
        </div>
        <div class="col-12">
          <label class="form-label">Phone:</label>
          <input type="tel" class="form-control" placeholder="Enter Your Phone Number" />
        </div>
        <div class="col-12">
          <label class="form-label">Email:</label>
          <input type="email" class="form-control" placeholder="Enter Your Email ID" />
        </div>
        <div class="col-12">
          <label class="form-label">Date of Birth:</label>
          <input type="date" class="form-control" placeholder="Date of Birth" />
        </div>
        <div class="col-12">
          <label class="form-label">Passport Number:</label>
          <input type="text" class="form-control" placeholder="9 digit Passport Number" maxlength="9" />
        </div>
        <div class="col-12">
          <label class="form-label">Address:</label>
          <textarea class="form-control" rows="3" placeholder="Enter Your Permanent Address"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">Password:</label>
          <input type="password" class="form-control" placeholder="Enter Password" />
        </div>
        <div class="col-12">
          <label class="form-label">Confirm Password:</label>
          <input type="password" class="form-control" placeholder="Confirm Password" />
        </div>
        <div class="col-12 mt-2">
          <a href="home.html" class="btn-tw-primary text-decoration-none d-block text-center py-2 rounded">Register</a>
        </div>
        <div class="col-12">
          <a href="login.html" class="btn-tw-outline text-decoration-none d-block text-center py-2 rounded">Back to Login</a>
        </div>
      </div>

      <div class="social-icons text-center mt-3 d-flex justify-content-center gap-2">
        <a href="#" class="social-yt"><i class="bi bi-youtube"></i></a>
        <a href="#" class="social-ig"><i class="bi bi-instagram"></i></a>
        <a href="#" class="social-fb"><i class="bi bi-facebook"></i></a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
